{% extends "base.html" %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">

    <div class="rounded-lg border bg-white shadow-sm">
      <div class="px-6 pb-2 pt-8 text-center">
        <div class="mx-auto flex h-10 w-10 items-center justify-center rounded-lg bg-zinc-100">
          <svg class="h-5 w-5 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
          </svg>
        </div>
        <h1 class="mt-4 text-base font-semibold text-zinc-900">
          Đăng nhập
        </h1>
        <p class="mt-0.5 text-xs text-zinc-500">
          Nhập thông tin tài khoản của bạn
        </p>
      </div>

      <div class="px-6 pb-8 pt-4">
        <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-4">
          <div>
            <label for="username" class="shadcn-label">Tên đăng nhập</label>
            <input type="text" id="username" name="username" required placeholder="Nhập tên đăng nhập"
                   class="shadcn-input" />
          </div>

          <div>
            <label for="password" class="shadcn-label">Mật khẩu</label>
            <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu"
                   class="shadcn-input" />
          </div>

          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" name="remember"
                   class="h-4 w-4 rounded border-zinc-300 text-zinc-900 focus:ring-zinc-900/20" />
            <label for="remember" class="text-sm text-zinc-600">
              Ghi nhớ đăng nhập
            </label>
          </div>

          <button type="submit" class="shadcn-btn-primary w-full">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
            Đăng nhập
          </button>
        </form>

        <p class="mt-6 text-center text-xs text-zinc-500">
          Chưa có tài khoản?
          <a href="{{ url_for('auth.register') }}" class="font-medium text-zinc-900 underline-offset-2 hover:underline">
            Đăng ký ngay
          </a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
