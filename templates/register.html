{% extends "base.html" %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">

    <div class="rounded-lg border bg-white shadow-sm">
      <div class="px-6 pb-2 pt-8 text-center">
        <div class="mx-auto flex h-10 w-10 items-center justify-center rounded-lg bg-zinc-100">
          <svg class="h-5 w-5 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
          </svg>
        </div>
        <h1 class="mt-4 text-base font-semibold text-zinc-900">
          Đăng ký
        </h1>
        <p class="mt-0.5 text-xs text-zinc-500">
          Tạo tài khoản mới
        </p>
      </div>

      <div class="px-6 pb-8 pt-4">
        <form action="{{ url_for('auth.register') }}" method="POST" class="space-y-4">
          <div>
            <label for="username" class="shadcn-label">Tên đăng nhập</label>
            <input type="text" id="username" name="username" required placeholder="Chọn tên đăng nhập"
                   class="shadcn-input" />
          </div>

          <div>
            <label for="email" class="shadcn-label">Email</label>
            <input type="email" id="email" name="email" required placeholder="Nhập địa chỉ email"
                   class="shadcn-input" />
          </div>

          <div>
            <label for="password" class="shadcn-label">Mật khẩu</label>
            <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu"
                   class="shadcn-input" />
          </div>

          <div>
            <label for="confirm_password" class="shadcn-label">Xác nhận mật khẩu</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Nhập lại mật khẩu"
                   class="shadcn-input" />
          </div>

          <button type="submit" class="shadcn-btn-primary w-full">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
            </svg>
            Đăng ký
          </button>
        </form>

        <p class="mt-6 text-center text-xs text-zinc-500">
          Đã có tài khoản?
          <a href="{{ url_for('auth.login') }}" class="font-medium text-zinc-900 underline-offset-2 hover:underline">
            Đăng nhập
          </a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
